<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System bus access policy for net.reactivated.Fprint, served by r503d.

  Stricter than upstream fprintd's `<allow send_destination=...>` for all —
  shrinks the attack surface so an SSH-only or kiosk-user account can't
  even start a conversation with the daemon. PAM (root) and interactive
  admins (wheel) keep working; everyone else gets D-Bus's
  "Rejected send message" at the bus layer, before the call ever lands
  in r503d's auth gate. Defense-in-depth with pcside/daemon/src/auth.rs.

  D-Bus loads /usr/share/dbus-1/system.d/ files first, then
  /etc/dbus-1/system.d/. The "last matching rule wins" semantics combined
  with our placement in /etc/ means our deny overrides upstream fprintd's
  "allow everyone" rule even when both packages are installed.

  Need to grant access to a specific non-wheel user (lab / kiosk)? Add
  them to `wheel`, or copy this file to /etc/dbus-1/system.d/ and add a
  matching `<policy user="...">` block.
-->
<busconfig>
  <!-- Default: deny non-root non-wheel callers from sending to the bus name. -->
  <policy context="default">
    <deny send_destination="net.reactivated.Fprint"/>
  </policy>

  <!-- Interactive admins (wheel) may send the four interfaces fprintd
       clients exercise. Anything else (e.g. arbitrary D-Bus introspection
       extensions, future undocumented interfaces) is still denied. -->
  <policy group="wheel">
    <allow send_destination="net.reactivated.Fprint"
           send_interface="net.reactivated.Fprint.Manager"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="net.reactivated.Fprint.Device"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>

  <!-- Root: owns the bus name (the daemon itself), and is allowed to send
       freely (PAM/sudo/SDDM run as root and need cross-user access via
       the uid-0 fast path in r503d's auth.rs). NB: on Fedora, root is NOT
       a member of `wheel`, so the wheel rule above does not cover root —
       this block is mandatory, not redundant. -->
  <policy user="root">
    <allow own="net.reactivated.Fprint"/>
    <allow send_destination="net.reactivated.Fprint"/>
  </policy>
</busconfig>
